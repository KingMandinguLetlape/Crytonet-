version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crytonet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crytonet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crytonet_dev}
      POSTGRES_DB: crytonet
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crytonet -d crytonet']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crytonet

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crytonet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crytonet

  # ─── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: crytonet-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://crytonet:${POSTGRES_PASSWORD:-crytonet_dev}@postgres:5432/crytonet
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      API_KEY_SALT: ${API_KEY_SALT:?API_KEY_SALT is required}
      HMAC_SECRET: ${HMAC_SECRET:?HMAC_SECRET is required}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - crytonet

  # ─── Worker ───────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: crytonet-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WORKER_PORT: 3002
      DATABASE_URL: postgresql://crytonet:${POSTGRES_PASSWORD:-crytonet_dev}@postgres:5432/crytonet
      REDIS_URL: redis://redis:6379
      API_KEY_SALT: ${API_KEY_SALT:?API_KEY_SALT is required}
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - crytonet

  # ─── Web Dashboard ────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: crytonet-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - crytonet

networks:
  crytonet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
